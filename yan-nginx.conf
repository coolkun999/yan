server {
    listen 80;
    server_name www.kunshagj.com;

    # 主站根目录
    root /var/www/html;
    index index.html;

    # 「言」子目录 - 关键：用 alias 而非 root
    location /yan/ {
        alias /var/www/html/yan/;
        try_files $uri $uri/ =404;
        index index.html;
    }

    # SPA 路由支持（刷新不 404）
    location /yan {
        return 301 /yan/;
    }
}
